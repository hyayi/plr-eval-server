# plr-eval-server — Kubernetes 배포 (Secret + Deployment + Service)
#
# ⚠ 실제 배포본(k8s/eval-server.yaml)은 .gitignore 대상 — 토큰·clone URL 등 환경별 값이
#   들어가므로 커밋 금지. 이 .example 을 복사해 편집:
#     cp k8s/eval-server.example.yaml k8s/eval-server.yaml
#
# 방식: 커스텀 이미지를 레지스트리에 올리지 않고, **베이스 이미지(python:3.12-slim)에서
#   pod 시작 시 git clone → pip install → uvicorn** 으로 부트스트랩한다(코드는 git에서).
#   → 프라이빗 레포면 GIT_REPO_URL 에 토큰 포함:
#        https://<PAT>@github.com/hyayi/plr-eval-server.git
#      퍼블릭이면 토큰 없이:  https://github.com/hyayi/plr-eval-server.git
#
# 저장소(PVC): 새로 만들지 않고 **기존 NFS PVC 재사용**(claimName 을 실제 이름으로).
#   코드는 컨테이너 임시 FS(/srv/app)에, 데이터만 NFS(/data/plr-eval-server)에 둔다.
#
# 적용:  kubectl -n <계정네임스페이스> apply -f k8s/eval-server.yaml
# 확인:  kubectl -n <계정> get pods,svc   ·   kubectl -n <계정> logs deploy/plr-eval-server-deployment
# 접속:  kubectl -n <계정> get svc plr-eval-server-service   # EXTERNAL-IP:8890 (LoadBalancer)
#
# ⚠ 사내 LAN 전용 — 공인망 노출 금지(크롭 = 사적 CCTV). LoadBalancer는 내부망으로만.
---
apiVersion: v1
kind: Secret
metadata:
  name: eval-server-secret
type: Opaque
stringData:
  EVAL_SERVER_TOKEN: "CHANGE-ME"        # 변이 API(등록/제출/삭제) 토큰 — 실제 값으로
  # 프라이빗 레포면 <PAT> 포함, 퍼블릭이면 토큰 빼기
  GIT_REPO_URL: "https://<PAT>@github.com/hyayi/plr-eval-server.git"
  # ── compare-reports 활성화 시에만 필요 (선택 기능) ─────────────────────
  # 구독/로그인 방식(권장 — 지금 개발에서 쓰는 로그인 계정 그대로):
  #   개발 머신에서 한 번  `claude setup-token`  실행 → 출력된 장수명 OAuth
  #   토큰을 아래에 붙여넣는다. 대화형 로그인을 파드에서 할 필요 없음.
  # CLAUDE_CODE_OAUTH_TOKEN: "CHANGE-ME-oauth-token"
  # (API 종량제 방식을 쓸 거면 위 대신 ANTHROPIC_API_KEY 를 넣는다)
  # ANTHROPIC_API_KEY: "CHANGE-ME-api-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plr-eval-server-deployment
  labels:
    app: plr-eval-server
spec:
  replicas: 1                           # 고정 — 쓰기 직렬화가 프로세스 내 asyncio.Lock +
                                        # 로컬 SQLite/파일. 2개 이상이면 상태 손상.
  strategy:
    type: Recreate                      # RWO PVC + 단일 writer → 롤링 대신 recreate
  selector:
    matchLabels:
      app: plr-eval-server
  template:
    metadata:
      labels:
        app: plr-eval-server
    spec:
      # nodeSelector:                    # 클러스터 규약에 맞게(선택). eval 서버는 GPU 불필요.
      #   role: dev
      containers:
        - name: server
          image: python:3.12-slim        # 베이스 이미지 — 커스텀 이미지 불필요
          workingDir: /srv
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              export DEBIAN_FRONTEND=noninteractive
              # 1) git 설치 (slim 베이스엔 없음)
              apt-get update && apt-get install -y --no-install-recommends git
              # 2) 서버 코드 clone (GIT_REF 기본 master). 코드는 임시 FS에.
              rm -rf /srv/app
              git clone --depth 1 --branch "${GIT_REF:-master}" "$GIT_REPO_URL" /srv/app
              cd /srv/app
              # 3) 의존성 설치 (루트 requirements.txt 에 fastapi/uvicorn/pyyaml/pillow 등 전부)
              pip install --no-cache-dir -r requirements.txt
              # 4) NFS 하위 데이터 폴더 보장 후 서버 기동 (--workers 1 고정)
              mkdir -p "$EVAL_SERVER_DATA"
              exec uvicorn server.app:app --host 0.0.0.0 --port 8890 --workers 1
          ports:
            - containerPort: 8890
          env:
            - name: EVAL_SERVER_DATA
              value: /data/perception/inseo/plr_server_data   # NFS 하위 전용 데이터 폴더
            # ── compare-reports (REQ-002) — 선택 기능 ────────────────────────
            # 이 기본 배포(python:3.12-slim, claude CLI 미설치)에서는 자동 비활성:
            # POST /api/compare-reports 가 503 + 안내를 반환하고 다른 기능은 정상.
            #
            # 활성화하려면 (A) 인증 토큰, (B) claude CLI, (C) 에이전트 정의 3가지가 필요:
            #
            # (A) 인증 — 구독/로그인 방식(권장): 위 Secret 의 CLAUDE_CODE_OAUTH_TOKEN
            #     주석을 해제하고 `claude setup-token` 으로 발급한 토큰을 넣은 뒤,
            #     아래 env 의 CLAUDE_CODE_OAUTH_TOKEN 주석도 해제한다.
            #     (API 종량제면 대신 ANTHROPIC_API_KEY 를 Secret+env 로 주입)
            #
            # (B)(C) claude CLI + 에이전트 원본은 위 args(부트스트랩)에 다음을 추가:
            #     # Node + claude CLI 설치
            #     apt-get install -y --no-install-recommends nodejs npm
            #     npm i -g @anthropic-ai/claude-code
            #     # compare-runs 에이전트 정의 원본 clone (읽기 전용 사용)
            #     git clone --depth 1 https://<PAT>@github.com/hyayi/plr-eval-server-master.git \
            #       /srv/agents/plr-eval-server-master
            #   그리고 아래 COMPARE_AGENTS_SRC env 주석을 해제한다. 서버가 기동 시
            #   <EVAL_SERVER_DATA>/compare_reports/_agents/ 에 tools 축소 사본을 설치해
            #   실행한다(원본은 읽기 전용). COMPARE_PYTHONPATH 는 evalkit 위치로,
            #   기본값이 서버 레포 루트(/srv/app)라 보통 생략 가능.
            #
            # 격리 권고(SRV-005): 에이전트 프로세스가 임의 명령 실행 벡터가 되지
            # 않도록 DATA_ROOT 는 읽기 전용 마운트 + compare_reports/ 만 쓰기
            # 가능하게 구성하고, EVAL_SERVER_TOKEN 을 반드시 설정할 것 —
            # 미설정 시 LAN 내 누구나 생성(모델 API 비용 지출)을 트리거할 수 있다.
            # - name: CLAUDE_CODE_OAUTH_TOKEN                # 구독/로그인 방식 (권장)
            #   valueFrom:
            #     secretKeyRef:
            #       name: eval-server-secret
            #       key: CLAUDE_CODE_OAUTH_TOKEN
            # - name: ANTHROPIC_API_KEY                      # API 종량제 방식 (대안)
            #   valueFrom:
            #     secretKeyRef:
            #       name: eval-server-secret
            #       key: ANTHROPIC_API_KEY
            # - name: COMPARE_AGENTS_SRC
            #   value: /srv/agents/plr-eval-server-master   # .claude/ 를 포함한 체크아웃
            # - name: CLAUDE_BIN
            #   value: claude                               # 기본값
            # - name: COMPARE_TIMEOUT_SEC
            #   value: "1800"                               # 기본값 (초과 시 kill→failed)
            # - name: COMPARE_PYTHONPATH
            #   value: /srv/app                             # evalkit 이 있는 레포 루트
            - name: GIT_REF
              value: master                  # 배포할 브랜치/태그
            - name: EVAL_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: eval-server-secret
                  key: EVAL_SERVER_TOKEN
            - name: GIT_REPO_URL
              valueFrom:
                secretKeyRef:
                  name: eval-server-secret
                  key: GIT_REPO_URL
          volumeMounts:
            - name: data
              mountPath: /data
          # clone+pip 로 기동이 느리므로 startupProbe 로 최대 ~5분 대기(그동안 liveness 미적용)
          startupProbe:
            httpGet:
              path: /health
              port: 8890
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8890
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8890
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: inseo301-nfs-all   # 기존 NFS PVC 재사용 — 새로 만들지 않음
---
apiVersion: v1
kind: Service
metadata:
  name: plr-eval-server-service
  labels:
    app: plr-eval-server
spec:
  type: LoadBalancer                    # 포트 노출: EXTERNAL-IP:8890 (내부 LB가 IP 할당).
  selector:
    app: plr-eval-server
  ports:
    - name: http
      protocol: TCP
      port: 8890                        # 외부 노출 서비스 포트
      targetPort: 8890                  # 컨테이너 포트
